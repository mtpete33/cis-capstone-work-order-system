worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    include /nix/store/8zcmz5vcaxav7cd2m33hs4bbid5y8i3b-nginx-1.28.0/conf/mime.types;
    default_type application/octet-stream;

    access_log /tmp/nginx_access.log;
    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    server {
        listen 5000;
        server_name _;

        root /home/runner/workspace/cis-capstone/public;
        index index.php;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
        }

        location / {
            fastcgi_pass unix:/tmp/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /home/runner/workspace/cis-capstone/router.php;
            include /nix/store/8zcmz5vcaxav7cd2m33hs4bbid5y8i3b-nginx-1.28.0/conf/fastcgi_params;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param DOCUMENT_ROOT /home/runner/workspace/cis-capstone/public;
            fastcgi_read_timeout 60;
        }
    }
}
